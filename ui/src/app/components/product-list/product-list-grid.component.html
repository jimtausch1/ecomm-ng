<div class="main-content">
  <div class="section__content section__content--p30">
    <div class="container-fluid">
      <div class="header-pagination">
        <div class="row">
          <div class="col-md-12">
            <div class="row">
              <div class="col-md-10" style="display: flex; justify-content: flex-start;">
                <ngb-pagination [collectionSize]="theTotalElements" [(page)]="thePageNumber" [pageSize]="thePageSize"
                  [maxSize]="5" [boundaryLinks]="true" (pageChange)="listProducts()">
                </ngb-pagination>
              </div>
              <div class="col-md-2 mt-2" style="text-align: right;">
                <span style="margin-right: 10px;">Page Size</span>
                <select #pageSizeSelect (change)="updatePageSize(+pageSizeSelect.value)">
                  <option selected="true">5</option>
                  <option>10</option>
                  <option>20</option>
                  <option>50</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div *ngFor="let product of products" class="col-sm-6 col-lg-3">
          <div class="card">
            <div class="card-body">
              <div class="mx-auto d-block">
                <a routerLink="/products/{{ product.id }}">
                  <img class="rounded-circle mx-auto d-block" [src]="product.imageUrl" alt="{{ product.name }}" />
                </a>
                <div class="product-name">
                  <h6>{{ product.name }}</h6>
                </div>
                <div class="location text-sm-center"><span>{{ product.unitPrice | currency }}</span></div>
              </div>
              <hr />
              <div class="card-text text-sm-center">
                <a href="#" class="primary-btn">Add to Cart</a>
              </div>
            </div>
          </div>
        </div>
        <div *ngIf="products.length === 0" class="alert alert-warning col-md-12" role="alert">
          <p>No products found.</p>
        </div>
      </div>
    </div>
  </div>
