<div class="detail-section">
  <div class="container-fluid">
    <img class="detail-image" [src]="product().imageUrl" />
    <h3>{{ product().name }}</h3>
    <div class="price">{{ product().unitPrice | currency }}</div>
    <button (click)="addToCart(product())" class="btn btn-primary btn-sm">Add to Cart</button>

    <hr />
    <h4>Description</h4>
    <p>{{ product().description }}</p>

    <a routerLink="/products" class="mt-1">Back to Products</a>

  </div>
</div>
